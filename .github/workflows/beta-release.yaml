name: Beta Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+-[0-9]+-beta"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run fn-build

      - name: Create beta release
        uses: ncipollo/release-action@v1.14.0
        with:
          name: Beta release ${{ github.ref_name }}
          prerelease: true
          artifacts: "main.js,manifest-beta.json,styles.css"
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
